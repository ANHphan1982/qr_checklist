services:
  - type: web
    name: qr-checklist-api
    runtime: python
    region: singapore          # gần VN nhất trên free tier
    plan: free

    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    # Health check — Render dùng để biết app đã sẵn sàng
    healthCheckPath: /health

    envVars:
      # Điền các giá trị này trong Render Dashboard → Environment
      - key: DATABASE_URL
        sync: false            # sync: false = nhập tay trong dashboard

      - key: RESEND_API_KEY
        sync: false

      - key: EMAIL_FROM
        sync: false

      - key: EMAIL_TO
        sync: false

      - key: FLASK_ENV
        value: production

      - key: CORS_ORIGIN
        sync: false            # điền sau khi biết URL Vercel

      - key: QR_SECRET
        sync: false

      - key: QR_WINDOW_SECONDS
        value: "300"

      - key: REQUIRE_ROTATING_QR
        value: "false"

      - key: REQUIRE_GPS
        value: "false"

      - key: MAX_GPS_ACCURACY_METERS
        value: "200"

      - key: RATE_LIMIT_WINDOW_MINUTES
        value: "60"

      - key: RATE_LIMIT_MAX_SCANS
        value: "3"
