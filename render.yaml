services:
  - type: web
    name: qr-checklist-api
    runtime: python
    region: singapore          # gần VN nhất trên free tier
    plan: free

    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120

    # Health check — Render dùng để biết app đã sẵn sàng
    healthCheckPath: /health

    envVars:
      # Điền các giá trị này trong Render Dashboard → Environment
      - key: DATABASE_URL
        sync: false            # sync: false = nhập tay trong dashboard

      - key: RESEND_API_KEY
        sync: false

      - key: EMAIL_FROM
        sync: false

      - key: EMAIL_TO
        sync: false

      - key: FLASK_ENV
        value: production

      - key: CORS_ORIGIN
        sync: false            # điền sau khi biết URL Vercel
